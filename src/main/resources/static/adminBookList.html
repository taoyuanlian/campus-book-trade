<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员商品管理</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">校园二手书平台-管理员后台</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="#" id="userName">管理员</a></li>
            <li><a href="index.html">返回首页</a></li>
            <li><a href="login.html" id="logoutBtn">退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 20px;">
    <div class="panel panel-default">
        <div class="panel-heading">所有商品列表（管理员专属）</div>
        <div class="panel-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>书名</th>
                    <th>作者</th>
                    <th>发布者ID</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="adminBookList">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 全局变量
    let token = localStorage.getItem("token");
    let role = localStorage.getItem("role");

    // 统一工具函数
    const utils = {
        // 错误提示+跳转
        showErrorAndRedirect: function(msg, targetUrl) {
            alert(msg);
            window.location.href = targetUrl;
        },
        // 清空登录状态
        clearLogin: function() {
            localStorage.clear();
            window.location.href = "login.html";
        },
        // 解析Token获取role
        parseTokenRole: function() {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                role = payload.role;
                localStorage.setItem("role", role);
                return role;
            } catch (e) {
                this.showErrorAndRedirect("Token解析失败，请重新登录！", "login.html");
                return null;
            }
        }
    };

    // 页面初始化
    $(function () {
        // 1. 登录态校验
        if (!token) {
            utils.showErrorAndRedirect("请先登录管理员账号！", "login.html");
            return;
        }

        // 2. 解析role（兼容缓存丢失）
        if (!role) {
            const parsedRole = utils.parseTokenRole();
            if (!parsedRole) return;
        }

        // 3. 管理员权限校验
        if (role !== "admin") {
            utils.showErrorAndRedirect("权限不足！仅管理员可访问此页面", "index.html");
            return;
        }

        // 4. 加载商品列表
        loadAllBooks();

        // 5. 退出登录
        $("#logoutBtn").click(utils.clearLogin);
    });

    // 加载所有商品
    function loadAllBooks() {
        $("#adminBookList").html('<tr><td colspan="5" class="text-center">加载中...</td></tr>');

        $.ajax({
            url: "/admin/book/list",
            type: "GET",
            headers: { "token": token },
            dataType: "json",
            success: function (res) {
                let html = "";
                if (res.code === 200) {
                    if (res.data.length === 0) {
                        html = '<tr><td colspan="5" class="text-center">暂无商品数据</td></tr>';
                    } else {
                        res.data.forEach(item => {
                            html += `<tr>
                                    <td>${item.id || '-'}</td>
                                    <td>${item.name || '未知书名'}</td>
                                    <td>${item.author || '未知作者'}</td>
                                    <td>${item.userId || '未知用户'}</td>
                                    <td>
                                        <button class="btn btn-xs btn-danger del-btn" data-id="${item.id}">强制删除</button>
                                    </td>
                                 </tr>`;
                        });
                    }
                    $("#adminBookList").html(html);
                    // 绑定删除事件
                    $("#adminBookList").on("click", ".del-btn", function () {
                        const id = $(this).attr("data-id");
                        if (confirm("确定强制删除该商品吗？删除后不可恢复！")) {
                            deleteBook(id);
                        }
                    });
                } else {
                    html = `<tr><td colspan="5" class="text-center text-danger">${res.msg}</td></tr>`;
                    $("#adminBookList").html(html);
                    utils.showErrorAndRedirect(res.msg, "index.html");
                }
            },
            error: function (err) {
                let errMsg = "";
                let targetUrl = "login.html";
                if (err.status === 401) {
                    errMsg = "Token失效，请重新登录";
                    localStorage.clear();
                } else if (err.status === 403) {
                    errMsg = "您不是管理员，无访问权限";
                    targetUrl = "index.html";
                } else if (err.status === 404) {
                    errMsg = "接口不存在，请联系管理员";
                    targetUrl = "index.html";
                } else {
                    errMsg = "加载失败：" + err.statusText;
                    targetUrl = "index.html";
                }
                $("#adminBookList").html(`<tr><td colspan="5" class="text-center text-danger">${errMsg}</td></tr>`);
                utils.showErrorAndRedirect(errMsg, targetUrl);
            }
        });
    }

    // 删除商品
    function deleteBook(id) {
        $.ajax({
            url: "/admin/book/" + id,
            type: "DELETE",
            headers: { "token": token },
            dataType: "json",
            success: function (res) {
                if (res.code === 200) {
                    alert("删除成功！");
                    loadAllBooks();
                } else {
                    utils.showErrorAndRedirect("删除失败：" + res.msg, "index.html");
                }
            },
            error: function (err) {
                let errMsg = "";
                let targetUrl = "login.html";
                if (err.status === 401) {
                    errMsg = "Token失效，请重新登录";
                    localStorage.clear();
                } else if (err.status === 403) {
                    errMsg = "您不是管理员，无删除权限";
                    targetUrl = "index.html";
                } else {
                    errMsg = "删除失败：" + err.statusText;
                    targetUrl = "index.html";
                }
                utils.showErrorAndRedirect(errMsg, targetUrl);
            }
        });
    }
</script>
</body>
</html>
