<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员商品管理</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">校园二手书平台-管理员后台</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="#" id="userName">管理员</a></li>
            <li><a href="index.html">返回首页</a></li>
            <li><a href="login.html" id="logoutBtn">退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 20px;">
    <div class="panel panel-default">
        <div class="panel-heading">所有商品列表（管理员专属）</div>
        <div class="panel-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>书名</th>
                    <th>作者</th>
                    <th>发布者ID</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="adminBookList">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let token = localStorage.getItem("token");
    let role = localStorage.getItem("role");

    // 校验是否为管理员
    $(function () {
        if (!token || role !== "admin") {
            alert("权限不足！仅管理员可访问");
            window.location.href = "login.html";
            return;
        }

        // 加载所有商品
        loadAllBooks();

        // 退出登录
        $("#logoutBtn").click(function () {
            localStorage.clear();
            window.location.href = "login.html";
        });
    });

    // 加载所有商品（调用管理员接口）
    function loadAllBooks() {
        $.ajax({
            url: "/admin/book/list",
            type: "GET",
            headers: { "token": token },
            success: function (res) {
                if (res.code === 200) {
                    let html = "";
                    res.data.forEach(item => {
                        html += `<tr>
                                <td>${item.id}</td>
                                <td>${item.name}</td>
                                <td>${item.author}</td>
                                <td>${item.userId}</td>
                                <td>
                                    <button class="btn btn-xs btn-danger del-btn" data-id="${item.id}">强制删除</button>
                                </td>
                             </tr>`;
                    });
                    $("#adminBookList").html(html);
                    // 绑定删除事件
                    $(".del-btn").click(function () {
                        let id = $(this).attr("data-id");
                        if (confirm("确定强制删除该商品吗？")) {
                            deleteBook(id);
                        }
                    });
                } else {
                    alert(res.msg);
                }
            },
            error: function (err) {
                alert("加载失败：" + err.statusText);
            }
        });
    }

    // 管理员删除商品
    function deleteBook(id) {
        $.ajax({
            url: "/admin/book/" + id,
            type: "DELETE",
            headers: { "token": token },
            success: function (res) {
                if (res.code === 200) {
                    alert("删除成功");
                    loadAllBooks();
                } else {
                    alert(res.msg);
                }
            },
            error: function (err) {
                alert("删除失败：" + err.statusText);
            }
        });
    }
</script>
</body>
</html>
