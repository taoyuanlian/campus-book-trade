<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员商品管理</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">校园二手书平台-管理员后台</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="#" id="userName">管理员</a></li>
            <li><a href="index.html">返回首页</a></li>
            <li><a href="login.html" id="logoutBtn">退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 20px;">
    <!-- 🔥 新增筛选按钮，方便管理员区分状态 -->
    <div class="form-group" style="margin-bottom:10px;">
        <button class="btn btn-default" onclick="loadAllBooks()">全部商品</button>
        <button class="btn btn-success" onclick="loadBooksByStatus(1)">仅看在售</button>
        <button class="btn btn-danger" onclick="loadBooksByStatus(0)">仅看已售出</button>
    </div>

    <div class="panel panel-default">
        <div class="panel-heading">所有商品列表（管理员专属）</div>
        <div class="panel-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>书名</th>
                    <th>作者</th>
                    <th>发布者用户名</th>
                    <th>商品状态</th> <!-- 🔥 新增状态列，直观区分 -->
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="adminBookList">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let token = localStorage.getItem("token");
    let role = localStorage.getItem("role");

    const utils = {
        showErrorAndRedirect: function(msg, targetUrl) {
            alert(msg);
            window.location.href = targetUrl;
        },
        clearLogin: function() {
            localStorage.clear();
            window.location.href = "login.html";
        },
        parseTokenRole: function() {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                role = payload.role;
                localStorage.setItem("role", role);
                return role;
            } catch (e) {
                this.showErrorAndRedirect("Token解析失败，请重新登录！", "login.html");
                return null;
            }
        }
    };

    $(function () {
        if (!token) {
            utils.showErrorAndRedirect("请先登录管理员账号！", "login.html");
            return;
        }
        if (!role) {
            const parsedRole = utils.parseTokenRole();
            if (!parsedRole) return;
        }
        if (role !== "admin") {
            utils.showErrorAndRedirect("权限不足！仅管理员可访问此页面", "index.html");
            return;
        }

        loadAllBooks();
        $("#logoutBtn").click(utils.clearLogin);
    });

    // 加载所有商品（默认）
    function loadAllBooks() {
        renderBooks(null);
    }

    // 按状态筛选商品（1=在售，0=已售出）
    function loadBooksByStatus(status) {
        renderBooks(status);
    }

    // 核心渲染函数（复用逻辑）
    function renderBooks(filterStatus) {
        $("#adminBookList").html('<tr><td colspan="6" class="text-center">加载中...</td></tr>');

        $.ajax({
            url: "/admin/book/list",
            type: "GET",
            headers: { "token": token },
            dataType: "json",
            success: function (res) {
                let html = "";
                if (res.code === 200) {
                    let bookList = res.data;
                    // 筛选状态（如果传了筛选条件）
                    if (filterStatus !== null) {
                        bookList = bookList.filter(item => item.status === filterStatus);
                    }

                    if (bookList.length === 0) {
                        let emptyTip = filterStatus === 1 ? "暂无在售商品" : (filterStatus === 0 ? "暂无已售出商品" : "暂无商品数据");
                        html = `<tr><td colspan="6" class="text-center">${emptyTip}</td></tr>`;
                    } else {
                        bookList.forEach(item => {
                            // 状态文字标色（在售=绿色，已售出=红色）
                            let statusHtml = item.status === 1 ?
                                '<span class="text-success">在售</span>' :
                                '<span class="text-danger">已售出</span>';

                            html += `<tr>
                                    <td>${item.id || '-'}</td>
                                    <td>${item.name || '未知书名'}</td>
                                    <td>${item.author || '未知作者'}</td>
                                    <td>${item.publisherName || '未知用户'}</td>
                                    <td>${statusHtml}</td>
                                    <td>
                                        <button class="btn btn-xs btn-danger del-btn" data-id="${item.id}">强制删除</button>
                                    </td>
                                 </tr>`;
                        });
                    }
                    $("#adminBookList").html(html);
                    // 绑定删除事件
                    $(".del-btn").click(function () {
                        const id = $(this).attr("data-id");
                        if (confirm("确定强制删除该商品吗？删除后不可恢复！")) {
                            deleteBook(id);
                        }
                    });
                } else {
                    html = `<tr><td colspan="6" class="text-center text-danger">${res.msg}</td></tr>`;
                    $("#adminBookList").html(html);
                }
            },
            error: function (err) {
                let errMsg = err.status === 401 ? "Token失效，请重新登录" : "加载失败：" + err.statusText;
                $("#adminBookList").html(`<tr><td colspan="6" class="text-center text-danger">${errMsg}</td></tr>`);
                if (err.status === 401) utils.clearLogin();
            }
        });
    }

    // 删除商品
    function deleteBook(id) {
        $.ajax({
            url: "/admin/book/" + id,
            type: "DELETE",
            headers: { "token": token },
            dataType: "json",
            success: function (res) {
                if (res.code === 200) {
                    alert("删除成功！");
                    loadAllBooks(); // 删除后刷新列表
                } else {
                    alert("删除失败：" + res.msg);
                }
            },
            error: function (err) {
                let errMsg = err.status === 401 ? "Token失效，请重新登录" : "删除失败：" + err.statusText;
                alert(errMsg);
                if (err.status === 401) utils.clearLogin();
            }
        });
    }
</script>
</body>
</html>
