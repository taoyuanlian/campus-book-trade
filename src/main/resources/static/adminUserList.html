<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员用户管理</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">校园二手书平台-管理员后台</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="#" id="userName">管理员</a></li>
            <li><a href="adminBookList.html">商品管理</a></li>
            <li><a href="index.html">返回首页</a></li>
            <li><a href="login.html" id="logoutBtn">退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 20px;">
    <div class="panel panel-default">
        <div class="panel-heading">所有用户列表（管理员专属）</div>
        <div class="panel-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>用户ID</th>
                    <th>用户名</th>
                    <th>角色</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="adminUserList">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let token = localStorage.getItem("token");
    let role = localStorage.getItem("role");

    // 工具函数（优化：确保弹窗+跳转必执行）
    const utils = {
        showErrorAndRedirect: function(msg, targetUrl) {
            // 强制弹窗（alert是阻塞式，用户必须确认）
            alert(msg);
            // 立即跳转（兼容部分浏览器延迟）
            window.location.href = targetUrl;
        },
        clearLogin: function() {
            localStorage.clear();
            this.showErrorAndRedirect("已退出登录，请重新登录", "login.html");
        },
        parseTokenRole: function() {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                role = payload.role;
                localStorage.setItem("role", role);
                return role;
            } catch (e) {
                this.showErrorAndRedirect("Token解析失败，请重新登录！", "login.html");
                return null;
            }
        }
    };

    // 页面初始化
    $(function () {
        // 1. 登录态校验（无Token直接弹窗跳转）
        if (!token || token === "undefined" || token === "") {
            utils.showErrorAndRedirect("请先登录管理员账号！", "login.html");
            return;
        }
        // 2. 解析role（兼容缓存丢失）
        if (!role) {
            const parsedRole = utils.parseTokenRole();
            if (!parsedRole) return;
        }
        // 3. 管理员权限校验
        if (role !== "admin") {
            utils.showErrorAndRedirect("权限不足！仅管理员可访问此页面", "index.html");
            return;
        }

        // 4. 加载用户列表
        loadAllUsers();

        // 5. 退出登录
        $("#logoutBtn").click(utils.clearLogin);
    });

    // 加载所有用户（修复错误回调：补充弹窗+跳转）
    function loadAllUsers() {
        $("#adminUserList").html('<tr><td colspan="4" class="text-center">加载中...</td></tr>');

        $.ajax({
            url: "/admin/user/list",
            type: "GET",
            headers: { "token": token },
            dataType: "json",
            timeout: 5000, // 新增：超时保护（5秒）
            success: function (res) {
                let html = "";
                if (res.code === 200) {
                    if (res.data.length === 0) {
                        html = '<tr><td colspan="4" class="text-center">暂无用户数据</td></tr>';
                    } else {
                        res.data.forEach(user => {
                            // 管理员账号禁止删除（按钮置灰）
                            let deleteBtn = user.username === "admin" ?
                                '<button class="btn btn-xs btn-danger" disabled>禁止删除</button>' :
                                `<button class="btn btn-xs btn-danger del-user-btn" data-id="${user.id}">删除用户</button>`;

                            html += `<tr>
                                    <td>${user.id || '-'}</td>
                                    <td>${user.username || '未知用户名'}</td>
                                    <td>${user.role || '普通用户'}</td>
                                    <td>${deleteBtn}</td>
                                 </tr>`;
                        });
                    }
                    $("#adminUserList").html(html);
                    // 绑定删除用户事件
                    $(".del-user-btn").click(function () {
                        const userId = $(this).attr("data-id");
                        const userName = $(this).parents("tr").find("td:eq(1)").text();
                        if (confirm(`确定删除用户【${userName}】吗？删除后该用户所有数据将被清空！`)) {
                            deleteUser(userId);
                        }
                    });
                } else {
                    // 后端返回错误（如权限不足）→ 弹窗+跳转
                    utils.showErrorAndRedirect(res.msg, "login.html");
                    html = `<tr><td colspan="4" class="text-center text-danger">${res.msg}</td></tr>`;
                    $("#adminUserList").html(html);
                }
            },
            error: function (err) {
                let errMsg = "";
                if (err.status === 401) {
                    errMsg = "Token失效，请重新登录";
                    // 清空失效Token + 弹窗跳转
                    localStorage.clear();
                    utils.showErrorAndRedirect(errMsg, "login.html");
                } else if (err.status === 403) {
                    errMsg = "您不是管理员，无访问权限";
                    utils.showErrorAndRedirect(errMsg, "index.html");
                } else if (err.status === 0) {
                    errMsg = "请求超时，请检查后端服务是否启动";
                    alert(errMsg);
                } else {
                    errMsg = "加载失败：" + err.statusText;
                    alert(errMsg);
                }
                // 显示错误文字
                $("#adminUserList").html(`<tr><td colspan="4" class="text-center text-danger">${errMsg}</td></tr>`);
            }
        });
    }

    // 删除用户（优化错误处理）
    function deleteUser(userId) {
        $.ajax({
            url: "/admin/user/" + userId,
            type: "DELETE",
            headers: { "token": token },
            dataType: "json",
            timeout: 5000,
            success: function (res) {
                if (res.code === 200) {
                    alert("用户删除成功！");
                    loadAllUsers(); // 删除后刷新列表
                } else {
                    alert("删除失败：" + res.msg);
                }
            },
            error: function (err) {
                let errMsg = "";
                if (err.status === 401) {
                    errMsg = "Token失效，请重新登录";
                    localStorage.clear();
                    utils.showErrorAndRedirect(errMsg, "login.html");
                } else {
                    errMsg = "删除失败：" + err.statusText;
                    alert(errMsg);
                }
            }
        });
    }
</script>
</body>
</html>
