<!--// 我的订单页面 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园二手书 - 我的订单</title>
    <!-- 引入依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">校园二手书平台</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="#" id="userName">欢迎，[未登录]</a></li>
            <li><a href="index.html">返回首页</a></li>
            <li><a href="login.html" id="logoutBtn">退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 20px;">
    <div class="panel panel-default">
        <div class="panel-heading">我的订单</div>
        <div class="panel-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>订单编号</th>
                    <th>书籍ID</th>
                    <th>书名</th> <!-- 新增：书名表头 -->
                    <th>订单金额</th>
                    <th>下单时间</th>
                    <th>订单状态</th> <!-- 注意：列数从5列→6列，colspan要对应改 -->
                    <th>操作</th> <!-- 新增：操作列（放删除按钮） -->
                </tr>
                </thead>
                <tbody id="orderList">
                <!-- 订单数据由JS加载 -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 全局变量
    let token = localStorage.getItem("token");
    let userId = localStorage.getItem("userId");
    let username = localStorage.getItem("username");

    // 页面加载校验
    $(function () {
        if (!token || !userId) {
            alert("请先登录！");
            window.location.href = "login.html";
            return;
        }

        // 显示用户名
        $("#userName").text("欢迎，" + (username || "普通用户"));

        // 加载我的订单
        loadMyOrders();

        // 退出登录
        $("#logoutBtn").click(function () {
            localStorage.clear();
            window.location.href = "login.html";
        });
    });

    // 加载个人订单（适配你的OrderInfo实体类）
    function loadMyOrders() {
        $.ajax({
            url: '/order/my/' + userId, // 后端获取个人订单接口
            type: 'GET',
            headers: {
                "token": token
            },
            success: function (res) {
                let html = "";
                let orderList = res.data || [];
                if (Array.isArray(orderList)) {
                    if (orderList.length === 0) {
                        // 注意：colspan从6→7（新增了操作列）
                        html = '<tr><td colspan="7" class="text-center">暂无订单数据</td></tr>';
                    } else {
                        orderList.forEach(function (item) {
                            // 修正后的映射（和后端逻辑对齐）
                            let statusText = "";
                            if (item.status === 1) { // 1=待支付
                                statusText = "<span class='label label-warning'>待支付</span>";
                            } else if (item.status === 2) { // 2=已支付
                                statusText = "<span class='label label-success'>已支付</span>";
                            } else if (item.status === 3) { // 3=已取消
                                statusText = "<span class='label label-danger'>已取消</span>";
                            } else { // 兜底（避免显示空白）
                                statusText = "<span class='label label-default'>未知状态</span>";
                            }
                            // 格式化时间（后端返回的Date类型转成可读格式）
                            let createTime = item.createTime ? new Date(item.createTime).toLocaleString() : "";

                            // 拼接订单html，调整列结构 + 新增删除按钮
                            html += `<tr>
                                    <td>${item.orderNo || ""}</td>
                                    <td>${item.bookId || ""}</td>
                                    <td>${item.bookName || "未知书名"}</td>
                                    <td>¥${item.price || 0}</td>
                                    <td>${createTime}</td>
                                    <td>
                                        ${statusText}
                                        <!-- 待支付状态显示「标记为已支付」按钮 -->
                                        ${item.status === 1 ?
                                `<button class="btn btn-xs btn-success pay-btn" data-id="${item.id}">标记为已支付</button>` :
                                ""}
                                    </td>
                                    <!-- 新增：操作列 - 删除按钮 -->
                                    <td>
                                        <button class="btn btn-xs btn-danger del-btn" data-id="${item.id}">删除订单</button>
                                    </td>
                                 </tr>`;
                        });
                    }
                } else {
                    // 注意：colspan从6→7
                    html = '<tr><td colspan="7" class="text-center text-danger">订单数据加载失败</td></tr>';
                }

                // 第一步：先把html渲染到页面
                $('#orderList').html(html);

                // 第二步：绑定「标记为已支付」按钮事件
                $("#orderList").on("click", ".pay-btn", function() {
                    const orderId = $(this).attr("data-id");
                    if (confirm("确认标记该订单为已支付吗？")) {
                        $.ajax({
                            url: "/order/updateStatus/" + orderId,
                            type: "PUT",
                            headers: { "token": token },
                            data: { status: 2 }, // 改成已支付
                            success: function(res) {
                                if (res.code === 200) {
                                    alert("标记成功！");
                                    loadMyOrders(); // 刷新订单列表
                                } else {
                                    alert("标记失败：" + res.msg);
                                }
                            },
                            error: function(err) {
                                alert("操作失败：" + err.statusText);
                            }
                        });
                    }
                });

                // 第三步：新增「删除订单」按钮事件绑定
                $("#orderList").on("click", ".del-btn", function() {
                    const orderId = $(this).attr("data-id");
                    // 二次确认，防止误删
                    if (confirm("⚠️ 确认删除该订单吗？删除后无法恢复！")) {
                        $.ajax({
                            url: "/order/delete/" + orderId, // 后端删除接口
                            type: "DELETE", // RESTful规范：删除用DELETE请求
                            headers: { "token": token }, // 带登录token
                            success: function(res) {
                                if (res.code === 200) {
                                    alert("订单删除成功！");
                                    loadMyOrders(); // 刷新列表，立刻看到删除效果
                                } else {
                                    alert("删除失败：" + res.msg);
                                }
                            },
                            error: function(err) {
                                alert("删除请求失败：" + err.statusText);
                            }
                        });
                    }
                });
            },
            error: function (err) {
                if (err.status === 401) {
                    alert("登录已过期，请重新登录！");
                    localStorage.removeItem("token");
                    window.location.href = "login.html";
                } else {
                    alert("订单加载失败：" + err.statusText);
                    // 注意：colspan从6→7
                    $('#orderList').html('<tr><td colspan="7" class="text-center text-danger">加载失败，请刷新</td></tr>');
                }
            }
        });
    }
</script>
</body>
</html>
