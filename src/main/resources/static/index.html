<!--// 主页（发布书籍、查看列表）-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园二手书 - 首页</title>
    <!-- 1. 只保留这一次jQuery引入！顺序绝对不能乱 -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <!-- 2. Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 3. Bootstrap JS（依赖jQuery，必须最后） -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">校园二手书平台</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="#" id="userName">欢迎，[未登录]</a></li>
            <!-- 新增：我的订单入口 -->
            <li><a href="myOrder.html" id="myOrderBtn">我的订单</a></li>
            <!-- 管理员专属入口：普通用户隐藏 -->
            <li id="adminMenu" style="display: none;"><a href="adminBookList.html">管理员商品管理</a></li>
            <li><a href="login.html" id="logoutBtn">退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 20px;">
    <div class="row">
        <!-- 左侧发布书籍 -->
        <div class="col-md-4">
            <div class="panel panel-info">
                <div class="panel-heading">发布二手书</div>
                <div class="panel-body">
                    <form id="bookForm">
                        <div class="form-group">
                            <label>书名</label>
                            <input type="text" class="form-control" name="name" placeholder="如：Java编程思想" required>
                        </div>
                        <div class="form-group">
                            <label>作者</label>
                            <input type="text" class="form-control" name="author" placeholder="作者名" required>
                        </div>
                        <div class="form-group">
                            <label>价格</label>
                            <input type="number" step="0.01" class="form-control" name="price" placeholder="0.00" value="20" required>
                        </div>
                        <div class="form-group">
                            <label>成色</label>
                            <select class="form-control" name="oldLevel" required>
                                <option>九成新</option>
                                <option>八成新</option>
                                <option>七成新</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-block">发布</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 右侧书籍列表 -->
        <div class="col-md-8">
            <div class="panel panel-default">
                <div class="panel-heading">书籍列表</div>
                <div class="panel-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>书名</th>
                            <th>作者</th>
                            <th>价格</th>
                            <th>成色</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="bookList">
                        <!-- 数据由JS加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 新增：编辑商品弹窗 -->
<div class="modal fade" id="editBookModal" tabindex="-1" role="dialog" aria-labelledby="editBookModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="editBookModalLabel">编辑商品</h4>
            </div>
            <div class="modal-body">
                <form id="editBookForm">
                    <!-- 隐藏存储商品ID -->
                    <input type="hidden" id="editBookId">
                    <div class="form-group">
                        <label>书名</label>
                        <input type="text" class="form-control" id="editName" placeholder="如：Java编程思想" required>
                    </div>
                    <div class="form-group">
                        <label>作者</label>
                        <input type="text" class="form-control" id="editAuthor" placeholder="作者名" required>
                    </div>
                    <div class="form-group">
                        <label>价格</label>
                        <input type="number" step="0.01" class="form-control" id="editPrice" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>成色</label>
                        <select class="form-control" id="editOldLevel" required>
                            <option>九成新</option>
                            <option>八成新</option>
                            <option>七成新</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveEditBtn">保存修改</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 全局变量：存储当前登录用户的Token和信息
    let token = localStorage.getItem("token");
    let userId = localStorage.getItem("userId");
    let username = localStorage.getItem("username");
    let role = localStorage.getItem("role"); // 新增：用户角色

    // 页面加载时先校验登录态
    $(function () {
        // 1. 未登录则强制跳回登录页
        if (!token) {
            alert("请先登录！");
            window.location.href = "login.html";
            return;
        }

        // 2. 显示登录用户名
        $("#userName").text("欢迎，" + (username || "普通用户"));

        // 3. 判断角色，显示管理员菜单
        if (role === "admin") {
            $("#adminMenu").show();
        }

        // 4. 加载书籍列表
        loadBooks();

        // 5. 发布书籍
        $('#bookForm').submit(function (e) {
            e.preventDefault();
            let bookData = {
                name: $("input[name='name']").val(),
                author: $("input[name='author']").val(),
                price: $("input[name='price']").val(),
                oldLevel: $("select[name='oldLevel']").val(),
                userId: userId
            };

            $.ajax({
                url: '/book/add',
                type: 'POST',
                contentType: 'application/json',
                headers: {
                    "token": token
                },
                data: JSON.stringify(bookData),
                success: function (res) {
                    if (res.code === 200) {
                        alert("发布成功！");
                        loadBooks();
                        $('#bookForm')[0].reset();
                    } else {
                        alert("发布失败：" + res.msg);
                    }
                },
                error: function (err) {
                    if (err.status === 401) {
                        alert("登录已过期，请重新登录！");
                        localStorage.clear();
                        window.location.href = "login.html";
                    } else {
                        alert("网络异常：" + err.statusText);
                    }
                }
            });
        });

        // 6. 退出登录
        $("#logoutBtn").click(function () {
            localStorage.clear();
            window.location.href = "login.html";
        });

        // 7. 保存编辑
        $('#saveEditBtn').click(function () {
            let bookData = {
                id: $('#editBookId').val(),
                name: $('#editName').val(),
                author: $('#editAuthor').val(),
                price: $('#editPrice').val(),
                oldLevel: $('#editOldLevel').val(),
                userId: userId
            };

            $.ajax({
                url: '/book/update',
                type: 'PUT',
                contentType: 'application/json',
                headers: {
                    "token": token
                },
                data: JSON.stringify(bookData),
                success: function (res) {
                    if (res.code === 200) {
                        alert("修改成功！");
                        $('#editBookModal').modal('hide');
                        loadBooks();
                    } else {
                        alert("修改失败：" + res.msg);
                    }
                },
                error: function (err) {
                    if (err.status === 401) {
                        alert("登录已过期，请重新登录！");
                        localStorage.clear();
                        window.location.href = "login.html";
                    } else {
                        alert("修改失败：" + err.statusText);
                    }
                }
            });
        });
    });

    // 加载书籍列表
    function loadBooks() {
        $.ajax({
            url: '/book/list',
            type: 'GET',
            headers: {
                "token": token
            },
            success: function (res) {
                let html = "";
                let bookList = res.data || [];
                if (Array.isArray(bookList)) {
                    if (bookList.length === 0) {
                        html = '<tr><td colspan="5" class="text-center">暂无书籍数据</td></tr>';
                    } else {
                        bookList.forEach(function (item) {
                            html += `<tr>
                                        <td>${item.name || ""}</td>
                                        <td>${item.author || ""}</td>
                                        <td>¥${item.price || 0}</td>
                                        <td>${item.oldLevel || ""}</td>
                                        <td>
                                            <button class="btn btn-xs btn-primary buy-btn" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">购买</button>
                                            <button class="btn btn-xs btn-warning edit-btn"
                                                    data-id="${item.id}"
                                                    data-name="${item.name}"
                                                    data-author="${item.author}"
                                                    data-price="${item.price}"
                                                    data-oldlevel="${item.oldLevel}">编辑</button>
                                            <button class="btn btn-xs btn-danger delete-btn" data-id="${item.id}">删除</button>
                                        </td>
                                     </tr>`;
                        });
                    }
                } else {
                    console.error("商品列表返回格式错误：", bookList);
                    html = '<tr><td colspan="5" class="text-center text-danger">数据加载失败</td></tr>';
                }
                $('#bookList').html(html);
                bindDeleteEvent();
                bindEditEvent();
                bindBuyEvent();
            },
            error: function (err) {
                alert("书籍列表加载失败：" + err.statusText);
                $('#bookList').html('<tr><td colspan="5" class="text-center text-danger">加载失败，请刷新</td></tr>');
            }
        });
    }

    // 购买功能
    function bindBuyEvent() {
        $('.buy-btn').click(function () {
            let bookId = $(this).attr('data-id');
            let bookName = $(this).attr('data-name');
            let bookPrice = $(this).attr('data-price');

            let confirmBuy = confirm(`确定购买《${bookName}》吗？价格：¥${bookPrice}`);
            if (!confirmBuy) return;

            let orderData = {
                userId: userId,
                bookId: bookId,
                price: bookPrice
            };

            $.ajax({
                url: '/order/create',
                type: 'POST',
                contentType: 'application/json',
                headers: {
                    "token": token
                },
                data: JSON.stringify(orderData),
                success: function (res) {
                    if (res.code === 200) {
                        alert(res.msg || "下单成功！可前往「我的订单」查看");
                    } else {
                        alert("下单失败：" + res.msg);
                    }
                },
                error: function (err) {
                    if (err.status === 401) {
                        alert("登录已过期，请重新登录！");
                        localStorage.clear();
                        window.location.href = "login.html";
                    } else {
                        alert("下单失败：" + err.statusText);
                    }
                }
            });
        });
    }

    // 编辑功能
    function bindEditEvent() {
        $('.edit-btn').click(function () {
            let bookId = $(this).attr('data-id');
            let name = $(this).attr('data-name');
            let author = $(this).attr('data-author');
            let price = $(this).attr('data-price');
            let oldLevel = $(this).attr('data-oldlevel');

            $('#editBookId').val(bookId);
            $('#editName').val(name);
            $('#editAuthor').val(author);
            $('#editPrice').val(price);
            $('#editOldLevel').val(oldLevel);
            $('#editBookModal').modal('show');
        });
    }

    // 删除功能
    function bindDeleteEvent() {
        $('.delete-btn').click(function () {
            if (!confirm("确定要删除该商品吗？删除后无法恢复！")) return;
            let bookId = $(this).attr('data-id');
            if (!bookId) {
                alert("商品ID为空，删除失败！");
                return;
            }

            $.ajax({
                url: '/book/delete/' + bookId,
                type: 'DELETE',
                headers: {
                    "token": token
                },
                success: function (res) {
                    if (res.code === 200) {
                        alert("删除成功！");
                        loadBooks();
                    } else {
                        alert("删除失败：" + res.msg);
                    }
                },
                error: function (err) {
                    if (err.status === 401) {
                        alert("登录已过期，请重新登录！");
                        localStorage.clear();
                        window.location.href = "login.html";
                    } else {
                        alert("删除失败：" + err.statusText);
                    }
                }
            });
        });
    }
</script>
</body>
</html>
