<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园二手书 - 首页</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
    <style>
        .form-inline .form-group { margin-right: 10px; }
        /* 强制分页居中，完美适配Bootstrap3 */
        .text-center nav {
            display: inline-block !important;
        }
        /* 清除分页li自带小黑点（元凶就是这个！） */
        .pagination li {
            list-style: none !important;
        }
        /* 分页整体上下间距 */
        .pagination {
            margin: 20px 0 !important;
        }
        /* 按钮之间拉开舒适间距 */
        .pagination > li {
            margin: 0 5px;
        }
        /* 分页按钮圆角美化 */
        .pagination > li > a {
            border-radius: 4px;
            min-width: 36px;
            text-align: center;
            padding: 6px 12px;
        }
        /* 当前选中页码高亮蓝色 */
        .pagination > li.active > a {
            background-color: #337ab7;
            border-color: #337ab7;
            color: #fff !important;
        }
        /* 底部数据文字样式 */
        .page-info {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        .search-panel { margin-bottom: 20px; }
        .table { margin-bottom: 20px; }
    </style>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">校园二手书平台</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="#" id="userName">欢迎，[未登录]</a></li>
            <li><a href="myOrder.html" id="myOrderBtn">我的订单</a></li>
            <li id="adminMenu" style="display: none;"><a href="adminBookList.html">管理员商品管理</a> </li>
            <li id="adminUserMenu" style="display: none;"><a href="adminUserList.html" style="margin-left:10px;">管理员用户管理</a></li>
            <li><a href="login.html" id="logoutBtn">退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 20px;">
    <div class="row search-panel">
        <div class="col-md-12">
            <div class="panel panel-default">
                <div class="panel-body">
                    <div class="form-inline">
                        <div class="form-group">
                            <label>商品分类：</label>
                            <select id="categorySelect" class="form-control">
                                <option value="">全部分类</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>关键词：</label>
                            <input type="text" id="keywordInput" class="form-control" placeholder="请输入书名关键词">
                        </div>
                        <button id="searchBtn" class="btn btn-primary">搜索</button>
                        <button id="resetBtn" class="btn btn-default">重置</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="panel panel-info">
                <div class="panel-heading">发布二手书</div>
                <div class="panel-body">
                    <form id="bookForm">
                        <div class="form-group">
                            <label>书名</label>
                            <input type="text" class="form-control" name="name" placeholder="如：Java编程思想" required>
                        </div>
                        <div class="form-group">
                            <label>作者</label>
                            <input type="text" class="form-control" name="author" placeholder="作者名" required>
                        </div>
                        <div class="form-group">
                            <label>价格</label>
                            <input type="number" step="0.01" class="form-control" name="price" placeholder="0.00" value="20" required>
                        </div>
                        <div class="form-group">
                            <label>成色</label>
                            <select class="form-control" name="oldLevel" required>
                                <option>九成新</option>
                                <option>八成新</option>
                                <option>七成新</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>分类</label>
                            <select class="form-control" name="category" id="publishCategory" required>
                                <option value="">请选择分类</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-block">发布</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="panel panel-default">
                <div class="panel-heading">书籍列表</div>
                <div class="panel-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>书名</th>
                            <th>作者</th>
                            <th>分类</th>
                            <th>价格</th>
                            <th>成色</th>
                            <th>发布者</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="bookList">
                        </tbody>
                    </table>

                    <div class="text-center">
                        <nav>
                            <ul class="pagination" id="pagination">
                                <li id="prevPage"><a href="javascript:;" aria-label="Previous"><span aria-hidden="true">&laquo;</span></a></li>
                                <li id="pageNumbers"></li>
                                <li id="nextPage"><a href="javascript:;" aria-label="Next"><span aria-hidden="true">&raquo;</span></a></li>
                            </ul>
                        </nav>
                        <div class="page-info" id="pageInfo">
                            共<span id="totalCount">0</span>条数据，共<span id="totalPage">0</span>页，当前第<span id="currentPage">1</span>页
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editBookModal" tabindex="-1" role="dialog" aria-labelledby="editBookModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="editBookModalLabel">编辑商品</h4>
            </div>
            <div class="modal-body">
                <form id="editBookForm">
                    <input type="hidden" id="editBookId">
                    <div class="form-group">
                        <label>书名</label>
                        <input type="text" class="form-control" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label>作者</label>
                        <input type="text" class="form-control" id="editAuthor" required>
                    </div>
                    <div class="form-group">
                        <label>价格</label>
                        <input type="number" step="0.01" class="form-control" id="editPrice" required>
                    </div>
                    <div class="form-group">
                        <label>成色</label>
                        <select class="form-control" id="editOldLevel" required>
                            <option>九成新</option>
                            <option>八成新</option>
                            <option>七成新</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>分类</label>
                        <select class="form-control" id="editCategory" required>
                            <option value="">请选择分类</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveEditBtn">保存修改</button>
            </div>
        </div>
    </div>
</div>

<script>
    let token = localStorage.getItem("token");
    let userInfo = {
        userId: localStorage.getItem("userId"),
        username: localStorage.getItem("username"),
        role: localStorage.getItem("role")
    };

    let pageParams = {
        page: 1,
        size: 10,
        category: "",
        name: ""
    };

    let categoryList = [];

    const utils = {
        parseToken: function() {
            if (!token) return false;
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userInfo = {
                    userId: payload.userId,
                    username: payload.username || payload.sub,
                    role: payload.role
                };
                localStorage.setItem("userId", userInfo.userId);
                localStorage.setItem("username", userInfo.username);
                localStorage.setItem("role", userInfo.role);
                return true;
            } catch (e) {
                alert("Token解析失败，请重新登录！");
                this.clearLogin();
                return false;
            }
        },
        clearLogin: function() {
            localStorage.clear();
            window.location.href = "login.html";
        },
        getAjaxHeader: function() {
            return { "token": token };
        },
        handleAjaxError: function(err) {
            if (err.status === 401) {
                alert("登录已过期，请重新登录！");
                this.clearLogin();
            } else {
                alert(`操作失败：${err.statusText || '网络异常'}`);
            }
        }
    };

    $(function () {
        if (!token) {
            alert("请先登录！");
            utils.clearLogin();
            return;
        }
        if (!userInfo.role) {
            if (!utils.parseToken()) return;
        }

        $("#userName").text(`欢迎，${userInfo.username || '普通用户'}`);
        if (userInfo.role === "admin") {
            $("#adminMenu").show();
            $("#adminUserMenu").show();
        }

        loadCategories();
        loadBooks();

        $("#searchBtn").click(function() {
            pageParams.name = $("#keywordInput").val().trim();
            pageParams.category = $("#categorySelect").val() || "";
            pageParams.page = 1;
            loadBooks();
        });

        $("#resetBtn").click(function() {
            $("#keywordInput").val("");
            $("#categorySelect").val("");
            pageParams = { page: 1, size: 10, category: "", name: "" };
            loadBooks();
        });

        $("#prevPage").click(function() {
            if (pageParams.page > 1) {
                pageParams.page--;
                loadBooks();
            } else {
                alert("已经是第一页了！");
            }
        });

        $("#nextPage").click(function() {
            const totalPage = parseInt($("#totalPage").text());
            if (pageParams.page < totalPage) {
                pageParams.page++;
                loadBooks();
            } else {
                alert("已经是最后一页了！");
            }
        });

        $('#bookForm').submit(function (e) {
            e.preventDefault();
            const bookData = {
                name: $("input[name='name']").val(),
                author: $("input[name='author']").val(),
                price: $("input[name='price']").val(),
                oldLevel: $("select[name='oldLevel']").val(),
                category: $("#publishCategory").val()
            };

            $.ajax({
                url: '/book/add',
                type: 'POST',
                contentType: 'application/json',
                headers: utils.getAjaxHeader(),
                data: JSON.stringify(bookData),
                success: function (res) {
                    if (res.code === 200) {
                        alert("发布成功！");
                        loadBooks();
                        $('#bookForm')[0].reset();
                    } else {
                        alert("发布失败：" + res.msg);
                    }
                },
                error: utils.handleAjaxError
            });
        });

        $("#logoutBtn").click(utils.clearLogin);

        $('#saveEditBtn').click(function () {
            const bookData = {
                id: $('#editBookId').val(),
                name: $('#editName').val(),
                author: $('#editAuthor').val(),
                price: $('#editPrice').val(),
                oldLevel: $('#editOldLevel').val(),
                category: $('#editCategory').val()
            };

            $.ajax({
                url: '/book/update',
                type: 'PUT',
                contentType: 'application/json',
                headers: utils.getAjaxHeader(),
                data: JSON.stringify(bookData),
                success: function (res) {
                    if (res.code === 200) {
                        alert("修改成功！");
                        $('#editBookModal').modal('hide');
                        loadBooks();
                    } else {
                        alert("修改失败：" + res.msg);
                    }
                },
                error: utils.handleAjaxError
            });
        });
    });

    function loadCategories() {
        $.ajax({
            url: '/book/categories',
            type: 'GET',
            headers: utils.getAjaxHeader(),
            success: function(res) {
                if (res.code === 200) {
                    categoryList = res.data;
                    let filterHtml = '<option value="">全部分类</option>';
                    let publishHtml = '<option value="">请选择分类</option>';
                    let editHtml = '<option value="">请选择分类</option>';

                    categoryList.forEach(cate => {
                        filterHtml += `<option value="${cate}">${cate}</option>`;
                        publishHtml += `<option value="${cate}">${cate}</option>`;
                        editHtml += `<option value="${cate}">${cate}</option>`;
                    });

                    $("#categorySelect").html(filterHtml);
                    $("#publishCategory").html(publishHtml);
                    $("#editCategory").html(editHtml);
                }
            },
            error: utils.handleAjaxError
        });
    }

    function loadBooks() {
        $.ajax({
            url: '/book/list',
            type: 'GET',
            headers: utils.getAjaxHeader(),
            data: pageParams,
            success: function (res) {
                let html = "";
                const bookPage = res.data || {};
                const bookList = bookPage.records || [];

                if (Array.isArray(bookList)) {
                    if (bookList.length === 0) {
                        html = '<tr><td colspan="7" class="text-center">暂无书籍数据</td></tr>';
                    } else {
                        bookList.forEach(function (item) {
                            let isSelf = userInfo.userId == item.userId;
                            let isAdmin = userInfo.role === "admin";

                            let btns = `<button class="btn btn-xs btn-primary buy-btn" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">购买</button>`;

                            if (isSelf || isAdmin) {
                                btns += `
                                    <button class="btn btn-xs btn-warning edit-btn" data-id="${item.id}" data-name="${item.name}" data-author="${item.author}" data-price="${item.price}" data-oldlevel="${item.oldLevel}" data-category="${item.category}">编辑</button>
                                    <button class="btn btn-xs btn-danger delete-btn" data-id="${item.id}">删除</button>
                                `;
                            } else {
                                btns += `<span class="text-muted"> &nbsp; 无权操作</span>`;
                            }

                            html += `<tr>
                                        <td>${item.name || ""}</td>
                                        <td>${item.author || ""}</td>
                                        <td>${item.category || ""}</td>
                                        <td>¥${item.price || 0}</td>
                                        <td>${item.oldLevel || ""}</td>
                                        <td>${item.publisherName || '用户'}</td>
                                        <td>${btns}</td>
                                     </tr>`;
                        });
                    }
                } else {
                    html = '<tr><td colspan="7" class="text-center text-danger">数据加载失败</td></tr>';
                }

                $('#bookList').html(html);
                renderPagination(bookPage);
                bindDeleteEvent();
                bindEditEvent();
                bindBuyEvent();
            },
            error: function(err) {
                alert("书籍列表加载失败：" + err.statusText);
                $('#bookList').html('<tr><td colspan="7" class="text-center text-danger">加载失败，请刷新</td></tr>');
            }
        });
    }

    function renderPagination(bookPage) {
        const totalCount = bookPage.total || 0;
        const totalPage = bookPage.pages || 0;
        const currentPage = bookPage.current || 1;

        $("#totalCount").text(totalCount);
        $("#totalPage").text(totalPage);
        $("#currentPage").text(currentPage);

        // 单页隐藏箭头，解决难看问题
        if(totalPage <= 1){
            $("#prevPage").hide();
            $("#nextPage").hide();
        } else {
            $("#prevPage").show();
            $("#nextPage").show();
        }

        let pageHtml = "";
        const startPage = Math.max(1, currentPage - 2);
        const endPage = Math.min(totalPage, currentPage + 2);

        for (let i = startPage; i <= endPage; i++) {
            if (i === currentPage) {
                pageHtml += `<li class="active"><a href="javascript:;">${i}</a></li>`;
            } else {
                pageHtml += `<li><a href="javascript:;" onclick="jumpToPage(${i})">${i}</a></li>`;
            }
        }

        $("#pageNumbers").html(pageHtml);
    }

    function jumpToPage(pageNum) {
        pageParams.page = pageNum;
        loadBooks();
    }

    function bindBuyEvent() {
        $('.buy-btn').click(function () {
            const bookId = $(this).attr('data-id');
            const bookName = $(this).attr('data-name');
            const bookPrice = $(this).attr('data-price');

            if (!confirm(`确定购买《${bookName}》吗？价格：¥${bookPrice}`)) return;

            const orderData = {
                userId: userInfo.userId,
                bookId: bookId,
                price: bookPrice
            };

            $.ajax({
                url: '/order/create',
                type: 'POST',
                contentType: 'application/json',
                headers: utils.getAjaxHeader(),
                data: JSON.stringify(orderData),
                success: function (res) {
                    if (res.code === 200) {
                        alert(res.msg || "下单成功！可前往「我的订单」查看");
                    } else {
                        alert("下单失败：" + res.msg);
                    }
                },
                error: utils.handleAjaxError
            });
        });
    }

    function bindEditEvent() {
        $('.edit-btn').click(function () {
            const bookId = $(this).attr('data-id');
            $('#editBookId').val(bookId);
            $('#editName').val($(this).attr('data-name'));
            $('#editAuthor').val($(this).attr('data-author'));
            $('#editPrice').val($(this).attr('data-price'));
            $('#editOldLevel').val($(this).attr('data-oldlevel'));
            $('#editCategory').val($(this).attr('data-category'));
            $('#editBookModal').modal('show');
        });
    }

    function bindDeleteEvent() {
        $('.delete-btn').click(function () {
            if (!confirm("确定要删除该商品吗？删除后无法恢复！")) return;
            const bookId = $(this).attr('data-id');
            if (!bookId) {
                alert("商品ID为空，删除失败！");
                return;
            }

            $.ajax({
                url: '/book/delete/' + bookId,
                type: 'DELETE',
                headers: utils.getAjaxHeader(),
                success: function (res) {
                    if (res.code === 200) {
                        alert("删除成功！");
                        loadBooks();
                    } else {
                        alert("删除失败：" + res.msg);
                    }
                },
                error: utils.handleAjaxError
            });
        });
    }
</script>
</body>
</html>
