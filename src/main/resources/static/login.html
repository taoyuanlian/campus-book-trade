<!--/登录页-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园二手书 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f5f5f5;">
<div class="container" style="margin-top: 100px;">
    <div class="row">
        <div class="col-md-4 col-md-offset-4">
            <div class="panel panel-default">
                <div class="panel-heading text-center">
                    <h3 class="panel-title">校园二手书交易系统</h3>
                </div>
                <div class="panel-body">
                    <form id="loginForm">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" class="form-control" name="username" placeholder="请输入用户名" value="test001">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" class="form-control" name="password" placeholder="请输入密码" value="123456">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">登录</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script>
    $(function () {
        $('#loginForm').submit(function (e) {
            e.preventDefault();

            // 组装 JSON 格式数据（必须这样写）
            let loginData = {
                username: $("input[name='username']").val(),
                password: $("input[name='password']").val()
            };

            // 发送 JSON 请求，不再用 serialize()
            $.ajax({
                url: "/user/login",
                type: "POST",
                contentType: "application/json",  // 关键：声明发送 JSON
                data: JSON.stringify(loginData),   // 关键：转 JSON 字符串
                success: function (res) {
                    if (res.code === 200) {
                        localStorage.setItem("token", res.data.token);
                        localStorage.setItem("userId", res.data.userId);
                        localStorage.setItem("username", res.data.username);
                        localStorage.setItem("role", res.data.role);

                        alert("登录成功！");
                        window.location.href = "index.html";
                    } else {
                        alert(res.msg);
                    }
                },
                error: function (err) {
                    alert("登录异常：" + err.responseText);
                }
            });
        });
    });
</script>
</body>
</html>
