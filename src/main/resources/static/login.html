<!--/登录页-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园二手书 - 登录</title>
    <!-- 引入Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f5f5f5;">
<div class="container" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-4 col-md-offset-4">
            <div class="panel panel-default">
                <div class="panel-heading text-center">
                    <h3 class="panel-title">校园二手书交易系统</h3>
                </div>
                <div class="panel-body">
                    <form id="loginForm">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" class="form-control" name="username" placeholder="请输入用户名" value="test001">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" class="form-control" name="password" placeholder="请输入密码" value="123456">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">登录</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script>
    $(function () {
        $('#loginForm').submit(function (e) {
            e.preventDefault(); // 阻止默认刷新
            $.post({
                url: '/user/login',
                data: $(this).serialize(),
                    success: function (res) {
                        if (res.code === 200) {
                            // 解析Token获取用户信息（可选，也可让后端返回userInfo）
                            localStorage.setItem("token", res.data);
                            localStorage.setItem("username", "test001"); // 实际应从后端返回的userInfo取
                            localStorage.setItem("userId", 1); // 实际应从后端返回的userInfo取
                            alert("登录成功");
                            window.location.href = "index.html";
                        } else {
                            alert(res.msg);
                        }
                    },
                // 新增：捕获后端返回的错误（比如Token生成失败）
                error: function (err) {
                    alert("登录接口异常：" + err.responseText);
                }
            });
        });
    });
</script>
</body>
</html>
