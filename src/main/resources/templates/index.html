<!--// 主页（发布书籍、查看列表）-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园二手书 - 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">校园二手书平台</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="#">欢迎，[测试用户]</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top: 20px;">
    <div class="row">
        <!-- 左侧发布书籍 -->
        <div class="col-md-4">
            <div class="panel panel-info">
                <div class="panel-heading">发布二手书</div>
                <div class="panel-body">
                    <form id="bookForm">
                        <div class="form-group">
                            <label>书名</label>
                            <input type="text" class="form-control" name="name" placeholder="如：Java编程思想">
                        </div>
                        <div class="form-group">
                            <label>作者</label>
                            <input type="text" class="form-control" name="author" placeholder="作者名">
                        </div>
                        <div class="form-group">
                            <label>价格</label>
                            <input type="number" class="form-control" name="price" placeholder="0.00" value="20">
                        </div>
                        <div class="form-group">
                            <label>成色</label>
                            <select class="form-control" name="oldLevel">
                                <option>九成新</option>
                                <option>八成新</option>
                                <option>七成新</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-block">发布</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 右侧书籍列表 -->
        <div class="col-md-8">
            <div class="panel panel-default">
                <div class="panel-heading">书籍列表</div>
                <div class="panel-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>书名</th>
                            <th>作者</th>
                            <th>价格</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="bookList">
                        <!-- 数据由JS加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script>
    // 1. 加载书籍列表
    $(function () {
        loadBooks();

        // 2. 发布书籍
        $('#bookForm').submit(function (e) {
            e.preventDefault();
            $.post({
                url: '/book/add', // 假设你后面会写这个接口
                data: $(this).serialize(),
                success: function (res) {
                    if (res.code === 200) {
                        alert("发布成功");
                        loadBooks(); // 刷新列表
                        $('#bookForm')[0].reset(); // 清空表单
                    }
                }
            });
        });
    });

    function loadBooks() {
        $.get({
            url: '/book/list', // 假设你后面会写这个接口
            success: function (res) {
                let html = "";
                // 假设返回数据是数组 data
                (res.data || []).forEach(item => {
                    html += `<tr>
                                <td>${item.name}</td>
                                <td>${item.author}</td>
                                <td>¥${item.price}</td>
                                <td><button class="btn btn-xs btn-primary">购买</button></td>
                             </tr>`;
                });
                $('#bookList').html(html);
            }
        });
    }
</script>
</body>
</html>
